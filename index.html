<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Knowledge Board</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        h1 { color: #333; margin-bottom: 5px; }
        .instruction { color: #666; margin-bottom: 20px; font-size: 1.1em; }
        
        #input-section {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: inline-block;
            margin-bottom: 15px;
        }
        input[type="text"] {
            padding: 12px;
            width: 300px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 5px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #007bff; }
        button {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin-left: 10px;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        .share-btn { background-color: #007bff; color: white; }
        .share-btn:hover { background-color: #0056b3; }

        /* নতুন এডমিন কন্ট্রোল বাটনগুলোর ডিজাইন */
        .admin-controls {
            margin-bottom: 30px;
        }
        .save-btn { background-color: #28a745; color: white; margin-right: 5px;}
        .save-btn:hover { background-color: #218838; }
        .clear-btn { background-color: #dc3545; color: white; }
        .clear-btn:hover { background-color: #c82333; }

        #board {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .note {
            background-color: #ffe066;
            padding: 20px 15px 10px 15px;
            width: 160px;
            min-height: 120px;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-radius: 2px 2px 15px 2px;
            animation: popIn 0.3s ease-out;
            position: relative;
        }
        .note::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background-color: #e74c3c;
            border-radius: 50%;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        .note-text {
            font-weight: bold;
            font-size: 18px;
            color: #333;
            word-wrap: break-word;
            margin-top: 10px;
            margin-bottom: 15px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feedback-bar {
            display: flex;
            justify-content: space-around;
            width: 100%;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 8px;
        }
        .reaction-btn {
            cursor: pointer;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid transparent;
            padding: 4px 8px;
            border-radius: 15px;
            user-select: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: bold;
            color: #444;
        }
        .reaction-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.1);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>💡 Interactive Idea Board</h1>
    <p class="instruction">Write a keyword, react to others, and give stars! ⭐</p>

    <div id="input-section">
        <input type="text" id="ideaInput" placeholder="Enter a word (e.g. Solar Energy)" maxlength="30">
        <button class="share-btn" onclick="addIdea()">Share Idea</button>
    </div>

    <div class="admin-controls">
        <button class="save-btn" onclick="saveData()">💾 Save Record</button>
        <button class="clear-btn" onclick="clearBoard()">❌ Clear All</button>
    </div>

    <div id="board"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // তোমার Firebase Config 
        const firebaseConfig = {
            apiKey: "AIzaSyBVt5O26kXIqlDzTh49E4jRzv4iu2gpoqc",
            authDomain: "shared-idea-board.firebaseapp.com",
            databaseURL: "https://shared-idea-board-default-rtdb.firebaseio.com",
            projectId: "shared-idea-board",
            storageBucket: "shared-idea-board.firebasestorage.app",
            messagingSenderId: "927065331191",
            appId: "1:927065331191:web:7ff8eae8b1e0a38c468af2"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const ideasRef = database.ref('ideas');

        // নতুন আইডিয়া সাবমিট করা
        function addIdea() {
            let inputField = document.getElementById("ideaInput");
            let ideaText = inputField.value.trim();

            if (ideaText !== "") {
                ideasRef.push({
                    text: ideaText,
                    timestamp: firebase.database.ServerValue.TIMESTAMP,
                    stars: 0,
                    thumbsUp: 0,
                    heart: 0
                });
                inputField.value = ""; 
                inputField.focus();
            } else {
                alert("Please write something before sharing!");
            }
        }

        // Enter বাটন সাপোর্ট
        document.getElementById("ideaInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                addIdea();
            }
        });

        // স্টার এবং রিঅ্যাকশন আপডেট করা
        function updateReaction(key, type, currentCount) {
            database.ref('ideas/' + key).update({
                [type]: (currentCount || 0) + 1
            });
        }

        // রিয়েল-টাইম ডাটা লিসেন ও রেন্ডার করা
        ideasRef.on('value', (snapshot) => {
            let board = document.getElementById("board");
            board.innerHTML = ""; 
            
            let ideasArray = [];

            snapshot.forEach((childSnapshot) => {
                let data = childSnapshot.val();
                data.key = childSnapshot.key;
                ideasArray.push(data);
            });

            ideasArray.sort((a, b) => (b.stars || 0) - (a.stars || 0));

            ideasArray.forEach((idea) => {
                let newNote = document.createElement("div");
                newNote.className = "note";
                
                let textDiv = document.createElement("div");
                textDiv.className = "note-text";
                textDiv.innerText = idea.text;

                let feedbackBar = document.createElement("div");
                feedbackBar.className = "feedback-bar";

                let starBtn = document.createElement("div");
                starBtn.className = "reaction-btn";
                starBtn.innerHTML = `⭐ ${idea.stars || 0}`;
                starBtn.onclick = () => updateReaction(idea.key, 'stars', idea.stars || 0);

                let thumbsUpBtn = document.createElement("div");
                thumbsUpBtn.className = "reaction-btn";
                thumbsUpBtn.innerHTML = `👍 ${idea.thumbsUp || 0}`;
                thumbsUpBtn.onclick = () => updateReaction(idea.key, 'thumbsUp', idea.thumbsUp || 0);

                let heartBtn = document.createElement("div");
                heartBtn.className = "reaction-btn";
                heartBtn.innerHTML = `❤️ ${idea.heart || 0}`;
                heartBtn.onclick = () => updateReaction(idea.key, 'heart', idea.heart || 0);

                feedbackBar.appendChild(starBtn);
                feedbackBar.appendChild(thumbsUpBtn);
                feedbackBar.appendChild(heartBtn);

                newNote.appendChild(textDiv);
                newNote.appendChild(feedbackBar);

                board.appendChild(newNote);
            });
        });

        // নতুন ফিচার: পুরো বোর্ড ক্লিয়ার করা (Cross / Delete All)
        function clearBoard() {
            let confirmDelete = confirm("Are you sure you want to clear the entire board? This cannot be undone!");
            if (confirmDelete) {
                ideasRef.remove().then(() => {
                    alert("Board cleared successfully!");
                }).catch((error) => {
                    alert("Error clearing board: " + error.message);
                });
            }
        }

        // নতুন ফিচার: বোর্ডের ডাটা টেক্সট ফাইল হিসেবে সেভ/ডাউনলোড করা
        function saveData() {
            ideasRef.once('value').then((snapshot) => {
                if (!snapshot.exists()) {
                    alert("The board is empty. Nothing to save!");
                    return;
                }

                let content = "--- Interactive Idea Board Record ---\n\n";
                let ideasArray = [];

                snapshot.forEach((childSnapshot) => {
                    ideasArray.push(childSnapshot.val());
                });

                // রেটিং অনুযায়ী সাজিয়ে টেক্সট জেনারেট করা
                ideasArray.sort((a, b) => (b.stars || 0) - (a.stars || 0));
                
                ideasArray.forEach((idea, index) => {
                    content += `${index + 1}. ${idea.text}\n`;
                    content += `   [ Stars: ${idea.stars||0} | Likes: ${idea.thumbsUp||0} | Hearts: ${idea.heart||0} ]\n\n`;
                });

                // ব্রাউজার থেকে ফাইল ডাউনলোড করানো
                let blob = new Blob([content], { type: "text/plain;charset=utf-8" });
                let link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "Idea_Board_Record.txt";
                link.click();
            });
        }
    </script>

</body>
</html>
